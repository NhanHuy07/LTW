	<div class="d-flex justify-content-center " style="padding-top: 30px; padding-bottom: 62px; background-color: #dcdcdc;">
    <div class="card shadow-lg p-4" style="width: 400px;">
        <h3 class="text-center mb-2" style="align-content: center;">Đăng Ký</h3>
        <form>
			<div class="mb-3">
                <label for="registerhoten" class="form-label">Họ Tên</label>
                <input type="text" class="form-control" id="registerHoten" required placeholder="Nhập họ và tên">
            </div>
            <div class="mb-3">
                <label for="registerEmail" class="form-label">Email</label>
                <input type="email" class="form-control" id="registerEmail" required placeholder="Nhập email">
            </div>
			<div class="mb-3">
                <label for="registersdt" class="form-label">Số điện thoại</label>
                <input type="text" class="form-control" id="registersdsdt" required placeholder="Nhập số điện thoại">
            </div>
            <div class="mb-3">
                <label for="registerPassword" class="form-label">Mật khẩu</label>
                <input type="password" class="form-control" id="registerPassword" required minlength="6" placeholder="Tối thiểu 6 ký tự">

            </div>
			<div class="mb-3">
   				 <label for="confirmPassword" class="form-label">Xác nhận mật khẩu</label>
   				 <input type="password" class="form-control" id="confirmPassword" required minlength="6" placeholder="Nhập lại mật khẩu">
			</div>

            <button type="submit" class="btn btn-primary w-100">Đăng ký</button>
            <div class="text-center mt-3">
                <small>Bạn đã có tài khoản? <a href="login.html">Đăng nhập</a></small>
            </div>
        </form>
    </div>
